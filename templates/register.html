{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block extra_head %}
<style>
  .auth-wrap {
    min-height: calc(100vh - 64px);
    display: flex; align-items: center; justify-content: center;
    padding: 3rem 1.5rem;
    background: linear-gradient(135deg, #e8f4f5 0%, var(--bg) 100%);
  }
  .auth-card {
    background: var(--card);
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,18,25,.12);
    padding: 2.8rem 2.8rem;
    width: 100%; max-width: 440px;
  }
  .auth-logo { font-family: 'Sora', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--teal-dk); text-align: center; margin-bottom: .4rem; }
  .auth-logo span { color: var(--coral); }
  .auth-sub { text-align: center; color: var(--muted); font-size: .9rem; margin-bottom: 2rem; }
  .auth-footer { text-align: center; margin-top: 1.5rem; font-size: .9rem; color: var(--muted); }
  .auth-footer a { color: var(--teal); font-weight: 600; text-decoration: none; }
  .btn-full { width: 100%; text-align: center; padding: .85rem; font-size: 1rem; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Med<span>Track</span></div>
    <div class="auth-sub">Create your patient account</div>

    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="e.g. Rahul Sharma" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min. 8 characters" required minlength="8">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account →</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
